<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Per Te ❤️</title>

<style>
body {
            background: linear-gradient(to bottom, #a8dadc, #457b9d);
            font-family: Arial, sans-serif;
            text-align: center;

            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

/* schermate */
.screen {
    position: absolute;
    width: 100%;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
}

/* seconda pagina nascosta */
.hidden {
    display: none;
}

h1 {
            color: #d6336c;
            font-size: 60px;
        }

 p {
            font-size: 36px;
            color: #fff;
            text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
            animation: glow 2s infinite;
        }

button {
    margin-top: 20px;
    padding: 14px 22px;
    font-size: 18px;
    border: none;
    border-radius: 25px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

/* animazione leggera (compatibile iPhone) */
@keyframes glow {
    0% {transform: scale(1);}
    50% {transform: scale(1.05);}
    100% {transform: scale(1);}
}
</style>
</head>

<body>

<!-- ✅ PRIMA SCHERMATA -->
<div id="page1" class="screen">
    <h1>Ho una sorpresa per te ❤️</h1>
    <button onclick="goToSecondPage()">Clicca qui</button>
</div>

<!-- ✅ SECONDA SCHERMATA -->
<div id="page2" class="screen hidden">
    <h1>Tanti Auguriiiiiiii ❤️</h1>

    <p>
        Buon compleanno Giordano <br><br>
        Secondo me, dovresti ripensarci... ❤️
    </p>

    <button onclick="openMusic()">🎵 Musica Maestro</button>
</div>

<script>

function goToSecondPage() {
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "flex";

    startAnimation();
}

function openMusic() {
    window.open("https://www.youtube.com/watch?v=FNdC1AJnzQE", "_blank");
}

/* ✅ animazione leggera mobile/iPhone */
function startAnimation() {
    let count = 0;

    const interval = setInterval(() => {
        createEmoji();
        count++;

        if (count > 80) clearInterval(interval);
    }, 300);
}

/* ✅ solo emoji */
function createEmoji() {

    const emojis = ["❤️","😍","🥰","😘","💕"];

    const emoji = document.createElement("div");
    emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];

    emoji.style.position = "fixed";
    emoji.style.top = "-20px";
    emoji.style.left = Math.random() * 100 + "vw";
    emoji.style.fontSize = "24px";
    emoji.style.transition = "transform 4s linear";

    document.body.appendChild(emoji);

    setTimeout(() => {
        emoji.style.transform = "translateY(110vh)";
    }, 50);

    setTimeout(() => emoji.remove(), 4500);
}

</script>

</body>
</html>
