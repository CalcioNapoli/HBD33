<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <title>Per Te ❤️</title>

    <style>
        body {
            background: linear-gradient(to bottom, #a8dadc, #457b9d);
            font-family: Arial, sans-serif;
            text-align: center;

            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        h1 {
            color: #d6336c;
            font-size: 60px;
        }

        p {
            font-size: 36px;
            color: #fff;
            text-shadow: 0 0 10px #ff4d6d, 0 0 20px #ff4d6d;
            animation: glow 2s infinite;
        }

        button {
            margin-top: 20px;
            padding: 12px 20px;
            font-size: 18px;
            background: #ff4d6d;
            border: none;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #ff1a4d;
        }

        .heart {
            font-size: 50px;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        @keyframes glow {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
</head>

<body>

    <div class="heart">❤️</div>

    <h1 id="titolo">Ho una sorpresa per te ...</h1>

    <button onclick="startLove()">Clicca qui</button>

    <p id="testo"></p>

    <!-- 🎵 Bottone musica -->
    <button id="musicaBtn" style="display:none;" onclick="openMusic()">
        🎵 Musica Maestro
    </button>

    <script>
        function startLove() {

            // Cambia testo
            document.getElementById("titolo").innerText = "Tanti Auguri Giordano ❤️";

            document.getElementById("testo").innerHTML =
                "Buon compleanno Doc <br><br>" +
                "Secondo me dovresti ripensarci... ❤️";

            // Mostra bottone musica
            document.getElementById("musicaBtn").style.display = "inline-block";

            // Avvia emoji
            setInterval(createEmoji, 250);
        }

        function openMusic() {
            window.open("https://www.youtube.com/watch?v=FNdC1AJnzQE&list=RDFNdC1AJnzQE&start_radio=1", "_blank");
        }

        function createEmoji() {
            const emojis = ["😂","🌹","❤️","😍","🥰","😘","😜","😎","🙄","🤣","💕"];

            const emoji = document.createElement("div");
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];

            emoji.style.position = "fixed";
            emoji.style.top = "-20px";
            emoji.style.left = Math.random() * 100 + "vw";
            emoji.style.fontSize = (20 + Math.random() * 30) + "px";
            emoji.style.animation = "fall linear";
            emoji.style.animationDuration = (3 + Math.random() * 3) + "s";

            document.body.appendChild(emoji);

            setTimeout(() => emoji.remove(), 6000);
        }
    </script>

</body>
</html>
